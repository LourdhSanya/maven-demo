trigger:
- main

pool:
  name: TestAgent   # your self-hosted agent

steps:

# Step 1: Check Java
- script: |
    java -version
    mvn -version
  displayName: 'Check Java and Maven Version'

# Step 2: Clean build
- script: |
    mvn clean package
  displayName: 'Maven Clean Package'

# Step 3: Publish test results (optional but good)
- task: PublishTestResults@2
  inputs:
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
  condition: succeededOrFailed()